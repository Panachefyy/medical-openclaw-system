<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>临床问诊助手 - 医生工作台</title>
    <meta name="theme-color" content="#0052cc" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./assets/app-icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <img class="brand-mark" src="./assets/app-icon.svg" alt="" aria-hidden="true" />
          <h1>临床问诊助手</h1>
          <span>医生工作台</span>
        </div>
        <label class="global-search" aria-label="搜索患者">
          <span>⌕</span>
          <input id="globalSearch" type="search" placeholder="搜索患者姓名、ID、病历号" />
        </label>
        <div class="top-actions">
          <button class="icon-action" type="button" aria-label="消息通知">✉<em>12</em></button>
          <button class="icon-action" type="button" aria-label="设置">⚙</button>
          <button class="icon-action" type="button" aria-label="帮助">?</button>
          <button class="icon-action fullscreen-action" type="button" id="fullscreenToggle" aria-label="进入全屏" title="进入全屏" aria-pressed="false">
            <span class="fullscreen-icon" aria-hidden="true"></span>
          </button>
          <div class="doctor-profile">
            <img alt="医生头像" src="https://images.unsplash.com/photo-1559839734-2b71ea197ec2?auto=format&fit=crop&w=96&q=80" />
            <strong>张医生</strong>
            <span>⌄</span>
          </div>
        </div>
      </header>

      <main class="workspace">
        <aside class="patient-sidebar">
          <section class="panel full-height">
            <div class="panel-title">
              <h2>今日就诊</h2>
            </div>
            <div class="segmented" id="statusTabs" role="tablist" aria-label="就诊状态"></div>
            <div class="patient-list" id="patientList"></div>
            <button class="refresh-btn" type="button" id="refreshList">↻ 刷新列表</button>
          </section>
        </aside>

        <section class="main-panel" id="mainPanel"></section>

        <aside class="ai-panel" id="aiPanel"></aside>
      </main>
    </div>

    <script src="./js/mock.js"></script>
    <script src="./js/config.js"></script>
    <script src="./js/http.js"></script>
    <script src="./js/state/store.js"></script>
    <script src="./js/services/patientService.js"></script>
    <script src="./js/viewModels/patientViewModel.js"></script>
    <script src="./js/ai/contextBuilder.js"></script>
    <script src="./js/ai/skillResultMapper.js"></script>
    <script src="./js/services/openclawService.js"></script>
    <script src="./js/api.js"></script>
    <script src="./js/app.js"></script>
    <script>
      const fullscreenToggle = document.getElementById('fullscreenToggle');
      let isFullscreen = false;

      function syncFullscreenButton() {
        fullscreenToggle.classList.toggle('is-fullscreen', isFullscreen);
        fullscreenToggle.setAttribute('aria-pressed', String(isFullscreen));
        fullscreenToggle.setAttribute('aria-label', isFullscreen ? '退出全屏' : '进入全屏');
        fullscreenToggle.setAttribute('title', isFullscreen ? '退出全屏' : '进入全屏');
      }

      function toggleFullscreen() {
        if (!isFullscreen) {
          if (document.documentElement.requestFullscreen) {
            document.documentElement.requestFullscreen();
          } else if (document.documentElement.mozRequestFullScreen) { /* Firefox */
            document.documentElement.mozRequestFullScreen();
          } else if (document.documentElement.webkitRequestFullscreen) { /* Chrome, Safari & Opera */
            document.documentElement.webkitRequestFullscreen();
          } else if (document.documentElement.msRequestFullscreen) { /* IE/Edge */
            document.documentElement.msRequestFullscreen();
          }
        } else {
          if (document.exitFullscreen) {
            document.exitFullscreen();
          } else if (document.mozCancelFullScreen) { /* Firefox */
            document.mozCancelFullScreen();
          } else if (document.webkitExitFullscreen) { /* Chrome, Safari & Opera */
            document.webkitExitFullscreen();
          } else if (document.msExitFullscreen) { /* IE/Edge */
            document.msExitFullscreen();
          }
        }
      }

      document.addEventListener('fullscreenchange', handleFullscreenChange);
      document.addEventListener('webkitfullscreenchange', handleFullscreenChange);
      document.addEventListener('mozfullscreenchange', handleFullscreenChange);
      document.addEventListener('MSFullscreenChange', handleFullscreenChange);

      function handleFullscreenChange() {
        isFullscreen = !!document.fullscreenElement ||
                      !!document.webkitFullscreenElement ||
                      !!document.mozFullScreenElement ||
                      !!document.msFullscreenElement;
        syncFullscreenButton();
      }

      syncFullscreenButton();
      fullscreenToggle.addEventListener('click', toggleFullscreen);

      if ('serviceWorker' in navigator && location.protocol !== 'file:' && !window.DISABLE_SERVICE_WORKER) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
